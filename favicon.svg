<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0520"/>
      <stop offset="50%" stop-color="#1a0a3e"/>
      <stop offset="100%" stop-color="#0a0618"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="10" y="10" width="492" height="492" rx="90" fill="url(#bg)" stroke="#6d28d9" stroke-width="5" stroke-opacity="0.7"/>

  <!-- Glow layer behind the eye -->
  <ellipse cx="256" cy="240" rx="140" ry="90" fill="#8b5cf6" opacity="0.08" filter="url(#blur)"/>

  <!-- Three prismatic lenses (Cerberus eye) -->
  <!-- Purple lens (top-left) -->
  <ellipse cx="235" cy="225" rx="105" ry="75" fill="#8b5cf6" opacity="0.18" transform="rotate(-5 235 225)"/>
  <ellipse cx="235" cy="225" rx="75" ry="53" fill="#8b5cf6" opacity="0.12" transform="rotate(-5 235 225)"/>

  <!-- Cyan lens (top-right) -->
  <ellipse cx="277" cy="225" rx="105" ry="75" fill="#22d3ee" opacity="0.18" transform="rotate(5 277 225)"/>
  <ellipse cx="277" cy="225" rx="75" ry="53" fill="#22d3ee" opacity="0.12" transform="rotate(5 277 225)"/>

  <!-- Magenta lens (bottom-center) -->
  <ellipse cx="256" cy="260" rx="105" ry="75" fill="#d946ef" opacity="0.18"/>
  <ellipse cx="256" cy="260" rx="75" ry="53" fill="#d946ef" opacity="0.12"/>

  <!-- Orbital ring segments -->
  <g fill="none" stroke-width="3.5" stroke-linecap="round">
    <path d="M 256 66 A 174 174 0 0 1 406 152" stroke="#8b5cf6" opacity="0.65"/>
    <path d="M 416 168 A 174 174 0 0 1 416 328" stroke="#22d3ee" opacity="0.65"/>
    <path d="M 406 344 A 174 174 0 0 1 256 430" stroke="#d946ef" opacity="0.65"/>
    <path d="M 240 430 A 174 174 0 0 1 96 344" stroke="#8b5cf6" opacity="0.65"/>
    <path d="M 86 328 A 174 174 0 0 1 86 168" stroke="#22d3ee" opacity="0.65"/>
    <path d="M 96 152 A 174 174 0 0 1 240 66" stroke="#d946ef" opacity="0.65"/>
  </g>

  <!-- Dots at ring joins -->
  <circle cx="256" cy="66" r="5" fill="#8b5cf6" opacity="0.85"/>
  <circle cx="410" cy="156" r="5" fill="#22d3ee" opacity="0.85"/>
  <circle cx="410" cy="340" r="5" fill="#d946ef" opacity="0.85"/>
  <circle cx="256" cy="430" r="5" fill="#8b5cf6" opacity="0.85"/>
  <circle cx="90" cy="340" r="5" fill="#22d3ee" opacity="0.85"/>
  <circle cx="90" cy="156" r="5" fill="#d946ef" opacity="0.85"/>

  <!-- Central cross (latin) -->
  <rect x="245" y="185" width="22" height="115" rx="3" fill="#e6edf3" opacity="0.9"/>
  <rect x="220" y="210" width="72" height="22" rx="3" fill="#e6edf3" opacity="0.9"/>

  <!-- G2G text -->
  <text x="256" y="460" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="56" fill="#e6edf3" opacity="0.9" letter-spacing="-1">G2G</text>
</svg>